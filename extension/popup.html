<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360">
  <title>Steelhead Automator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-body: #f8f9fa;
      --text-body: #1a1a2e;
      --bg-card: #ffffff;
      --border-card: #ddd;
      --text-muted: #666;
      --text-soft: #94a3b8;
      --bg-app-header: #f0f0f0;
      --bg-app-header-hover: #e8e8e8;
      --bg-results: #f5f5f5;
    }
    body.dark-mode {
      --bg-body: #0f172a;
      --text-body: #e2e8f0;
      --bg-card: #1e293b;
      --border-card: #334155;
      --text-muted: #94a3b8;
      --text-soft: #64748b;
      --bg-app-header: #1e293b;
      --bg-app-header-hover: #334155;
      --bg-results: #0f172a;
    }

    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-body);
      color: var(--text-body);
    }

    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: white; padding: 12px 16px; display: flex; align-items: center; gap: 10px;
    }
    .header-logo { width: 32px; height: 32px; object-fit: contain; border-radius: 4px; }
    .header-logo-wide { width: 64px; height: 32px; object-fit: contain; }
    .header-text { flex: 1; text-align: center; }
    .header-text h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.5px; }
    .header-text .subtitle { font-size: 10px; opacity: 0.7; margin-top: 2px; }

    .status-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 16px; background: #e8f5e9; font-size: 11px; color: #2e7d32;
      border-bottom: 1px solid #c8e6c9;
    }
    body.dark-mode .status-bar { background: #14532d; color: #4ade80; border-bottom-color: #166534; }
    .status-bar.error { background: #fbe9e7; color: #c62828; border-bottom-color: #ffcdd2; }
    body.dark-mode .status-bar.error { background: #450a0a; color: #f87171; border-bottom-color: #7f1d1d; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #4caf50; display: inline-block; margin-right: 6px; }
    .status-bar.error .status-dot { background: #f44336; }
    .btn-reload-inline {
      background: none; border: none; cursor: pointer; font-size: 16px; padding: 2px 4px;
      opacity: 0.6; transition: opacity 0.2s;
    }
    .btn-reload-inline:hover { opacity: 1; }

    .update-banner {
      display: none; padding: 10px 14px; background: #fff3cd; border-bottom: 1px solid #ffc107;
      font-size: 11px; color: #664d03; line-height: 1.4;
    }
    .update-banner.visible { display: block; }
    .update-banner-title { font-weight: 700; margin-bottom: 4px; color: #92400e; }
    .update-banner-row { display: flex; gap: 6px; margin-top: 6px; }
    .update-banner button {
      flex: 1; padding: 6px 8px; border: none; border-radius: 4px; font-size: 11px;
      font-weight: 600; cursor: pointer;
    }
    .update-banner .btn-update { background: #f59e0b; color: white; }
    .update-banner .btn-update:hover { background: #d97706; }
    .update-banner .btn-update-guide { background: #fde68a; color: #78350f; }
    .update-banner .btn-update-guide:hover { background: #fcd34d; }
    .update-banner .btn-update-dismiss { background: transparent; color: #92400e; flex: 0 0 auto; padding: 6px; }

    .view { display: none; }
    .view.active { display: block; }

    .app-menu-wrap { position: relative; }
    .app-menu { padding: 12px 16px 12px; display: flex; flex-direction: column; gap: 8px; max-height: 480px; overflow-y: auto; scroll-behavior: smooth; }
    .app-menu::-webkit-scrollbar { width: 6px; }
    .app-menu::-webkit-scrollbar-thumb { background: #c0c0c0; border-radius: 3px; }
    .app-menu::-webkit-scrollbar-track { background: transparent; }
    .scroll-fade {
      position: absolute; left: 0; right: 0; bottom: 0; height: 36px;
      background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, var(--bg-body) 100%);
      pointer-events: none; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 4px;
      font-size: 14px; color: var(--text-body); opacity: 0; transition: opacity 0.2s;
    }
    .scroll-fade.visible { opacity: 1; }
    .scroll-fade-arrow { animation: bounce 1.5s ease-in-out infinite; }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
    .app-card {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px; border: 1px solid var(--border-card); border-radius: 10px;
      background: var(--bg-card); cursor: pointer; transition: all 0.15s ease;
      color: var(--text-body);
    }
    .app-card:hover { border-color: #38bdf8; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
    .app-card:active { transform: scale(0.98); }
    .app-card .app-icon { font-size: 24px; width: 32px; text-align: center; }
    .app-card .app-info { flex: 1; }
    .app-card .app-info .app-name { font-size: 14px; font-weight: 600; }
    .app-card .app-info .app-subtitle { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .app-card .app-chevron { font-size: 14px; color: var(--text-soft); }
    .app-card.disabled { opacity: 0.5; cursor: default; }
    .app-card.disabled:hover { border-color: var(--border-card); box-shadow: none; }

    .app-view-header {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 16px; background: var(--bg-app-header); border-bottom: 1px solid var(--border-card);
      cursor: pointer; font-size: 14px; font-weight: 600; color: var(--text-body);
    }
    .app-view-header:hover { background: var(--bg-app-header-hover); }
    .app-actions { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }

    .btn {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 14px; border: 1px solid var(--border-card); border-radius: 8px;
      background: var(--bg-card); cursor: pointer; font-size: 13px; font-weight: 500;
      color: var(--text-body); transition: all 0.15s ease;
    }
    .btn:hover { border-color: #38bdf8; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: default; }
    .btn .btn-icon { font-size: 18px; width: 24px; text-align: center; }
    .btn .btn-label { flex: 1; }
    .btn .btn-label small { display: block; font-size: 10px; color: var(--text-muted); font-weight: 400; margin-top: 1px; }
    .btn-primary { background: #1a1a2e; color: white; border-color: #1a1a2e; }
    body.dark-mode .btn-primary { background: #38bdf8; color: #0f172a; border-color: #38bdf8; }
    .btn-primary:hover { background: #16213e; }
    body.dark-mode .btn-primary:hover { background: #0ea5e9; }
    .btn-primary .btn-label small { color: rgba(255,255,255,0.6); }
    body.dark-mode .btn-primary .btn-label small { color: rgba(15,23,42,0.6); }
    .btn-theme-toggle {
      background: none; border: none; cursor: pointer; font-size: 14px; padding: 2px 4px;
      opacity: 0.6; transition: opacity 0.2s;
    }
    .btn-theme-toggle:hover { opacity: 1; }

    .results-panel { padding: 12px 16px; max-height: 350px; overflow-y: auto; font-size: 12px; }
    .results-panel h3 { font-size: 13px; margin-bottom: 8px; }
    .results-stats { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
    .results-stat { padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .results-stat.new { background: #e8f5e9; color: #2e7d32; }
    .results-stat.changed { background: #fff3e0; color: #e65100; }
    .results-stat.known { background: #f3e5f5; color: #7b1fa2; }
    .results-stat.total { background: #e3f2fd; color: #1565c0; }
    .op-list { list-style: none; }
    .op-item { padding: 6px 8px; border-bottom: 1px solid var(--border-card); }
    .op-item .op-name { font-weight: 600; font-size: 12px; }
    .op-item .op-meta { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
    .op-badge { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 9px; font-weight: 700; text-transform: uppercase; margin-left: 4px; }
    .op-badge.known { background: #f3e5f5; color: #7b1fa2; }
    .op-badge.new { background: #e8f5e9; color: #2e7d32; }
    .op-badge.changed { background: #fff3e0; color: #e65100; }
    .op-badge.mutation { background: #fce4ec; color: #c62828; }
    .op-badge.query { background: #e3f2fd; color: #1565c0; }

    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
    .scan-indicator { display: none; margin-left: 8px; background: #c62828; color: white; font-size: 9px; font-weight: 700; padding: 1px 6px; border-radius: 3px; animation: blink 1s infinite; }
    .scan-indicator.active { display: inline; }

    .progress-container { display: none; padding: 0 16px 12px; }
    .progress-bar { height: 4px; background: var(--border-card); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: #4caf50; width: 0%; transition: width 0.3s ease; }
    .progress-text { font-size: 11px; color: var(--text-muted); margin-top: 4px; text-align: center; }

    .footer { padding: 6px 16px 10px; text-align: center; font-size: 10px; color: var(--text-soft); }
    #file-input { display: none; }

    /* Settings view */
    .settings-section { padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }
    .settings-section h3 { font-size: 13px; font-weight: 700; color: var(--text-body); }
    .settings-field { display: flex; flex-direction: column; gap: 4px; }
    .settings-field label { font-size: 11px; color: var(--text-muted); font-weight: 600; }
    .settings-field input[type="password"],
    .settings-field input[type="text"] {
      padding: 8px 10px; border: 1px solid var(--border-card); border-radius: 6px;
      background: var(--bg-card); color: var(--text-body); font-size: 12px;
      font-family: monospace; outline: none; transition: border-color 0.2s;
    }
    .settings-field input:focus { border-color: #38bdf8; }
    .settings-field .settings-hint { font-size: 10px; color: var(--text-soft); }
    .settings-save-row { display: flex; gap: 8px; align-items: center; }
    .btn-settings-save {
      padding: 8px 16px; background: #1a1a2e; color: white; border: none;
      border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer;
      transition: background 0.15s;
    }
    body.dark-mode .btn-settings-save { background: #38bdf8; color: #0f172a; }
    .btn-settings-save:hover { background: #16213e; }
    body.dark-mode .btn-settings-save:hover { background: #0ea5e9; }
    #settings-save-msg { font-size: 11px; color: #2e7d32; }
    body.dark-mode #settings-save-msg { color: #4ade80; }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/capaz-logo.png" class="header-logo" alt="Capaz">
    <div class="header-text">
      <h1>STEELHEAD AUTOMATOR</h1>
      <div class="subtitle">Ecoplating</div>
    </div>
    <img src="icons/steelhead-logo.png" class="header-logo-wide" alt="Steelhead">
  </div>

  <div id="update-banner" class="update-banner">
    <div class="update-banner-title">⬆️ Nueva versión disponible: <span id="update-new-version"></span></div>
    <div>Tienes la versión <span id="update-current-version"></span>. Descarga la nueva e instálala manualmente.</div>
    <div class="update-banner-row">
      <button class="btn-update" id="btn-update-download">📥 Descargar zip</button>
      <button class="btn-update-guide" id="btn-update-guide">📖 Cómo instalar</button>
      <button class="btn-update-dismiss" id="btn-update-dismiss" title="Ocultar hasta la próxima sesión">✕</button>
    </div>
  </div>

  <div id="status-bar" class="status-bar">
    <span style="display:flex;align-items:center"><span class="status-dot"></span><span id="status-text">Conectando...</span><span id="scan-indicator" class="scan-indicator">● REC <button id="btn-stop-scan" style="background:white;color:#c62828;border:none;border-radius:3px;font-size:9px;font-weight:700;padding:1px 5px;margin-left:4px;cursor:pointer">⏹</button></span></span>
    <span style="display:flex;align-items:center;gap:8px">
      <span id="version-text">v--</span>
      <button class="btn-theme-toggle" id="btn-theme-toggle" title="Modo claro/oscuro">🌙</button>
      <button class="btn-theme-toggle" id="btn-settings" title="Configuración">⚙️</button>
      <button class="btn-reload-inline" id="btn-copy-log" title="Copiar último log">📋</button>
      <button class="btn-reload-inline" id="btn-reload" title="Recargar Steelhead">🔃</button>
    </span>
  </div>

  <div id="view-menu" class="view active">
    <div class="app-menu-wrap">
      <div class="app-menu" id="app-menu"></div>
      <div class="scroll-fade" id="scroll-fade"><span class="scroll-fade-arrow">▼ más apps ▼</span></div>
    </div>
  </div>

  <div id="view-app" class="view">
    <div class="app-view-header" id="app-back"><span>◀</span><span id="app-title"></span></div>
    <div class="app-actions" id="app-actions"></div>
  </div>

  <div id="view-results" class="view">
    <div class="app-view-header" id="results-back"><span>◀</span><span id="results-title">Resultados</span></div>
    <div class="results-panel" id="results-content"></div>
  </div>

  <div id="progress-container" class="progress-container">
    <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
    <div id="progress-text" class="progress-text"></div>
  </div>

  <div id="view-settings" class="view">
    <div class="app-view-header" id="settings-back"><span>◀</span><span>Configuración</span></div>
    <div class="settings-section">
      <h3>Claude API</h3>
      <div class="settings-field">
        <label for="input-api-key">API Key</label>
        <input type="password" id="input-api-key" placeholder="sk-ant-api03-..." autocomplete="off">
        <span class="settings-hint" id="settings-key-hint"></span>
      </div>
      <div class="settings-save-row">
        <button class="btn-settings-save" id="btn-save-api-key">Guardar</button>
        <span id="settings-save-msg"></span>
      </div>
    </div>
  </div>

  <input type="file" id="file-input" accept=".csv">
  <div class="footer">Steelhead Automator v2 — Ecoplating</div>
  <script src="popup.js"></script>
</body>
</html>
