<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360">
  <title>Steelhead Automator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8f9fa;
      color: #1a1a2e;
    }

    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: white;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-logo {
      width: 32px;
      height: 32px;
      object-fit: contain;
      border-radius: 4px;
    }

    .header-text {
      flex: 1;
      text-align: center;
    }

    .header-text h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .header-text .subtitle {
      font-size: 10px;
      opacity: 0.7;
      margin-top: 2px;
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 16px;
      background: #e8f5e9;
      font-size: 11px;
      color: #2e7d32;
      border-bottom: 1px solid #c8e6c9;
    }

    .status-bar.error {
      background: #fbe9e7;
      color: #c62828;
      border-bottom-color: #ffcdd2;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4caf50;
      display: inline-block;
      margin-right: 6px;
    }

    .status-bar.error .status-dot {
      background: #f44336;
    }

    .actions {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: white;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: #1a1a2e;
      transition: all 0.15s ease;
    }

    .btn:hover {
      border-color: #1a1a2e;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn .icon {
      font-size: 20px;
      width: 28px;
      text-align: center;
    }

    .btn .label {
      flex: 1;
    }

    .btn .label small {
      display: block;
      font-size: 11px;
      color: #666;
      font-weight: 400;
      margin-top: 2px;
    }

    .btn-primary {
      background: #1a1a2e;
      color: white;
      border-color: #1a1a2e;
    }

    .btn-primary:hover {
      background: #16213e;
    }

    .btn-primary .label small {
      color: rgba(255,255,255,0.6);
    }

    .btn-reload {
      border-style: dashed;
      opacity: 0.7;
    }

    .btn-reload:hover {
      opacity: 1;
    }

    .footer {
      padding: 8px 16px 12px;
      text-align: center;
      font-size: 10px;
      color: #999;
    }

    #file-input {
      display: none;
    }

    .progress-container {
      display: none;
      padding: 0 16px 16px;
    }

    .progress-bar {
      height: 4px;
      background: #e0e0e0;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #4caf50;
      width: 0%;
      transition: width 0.3s ease;
    }

    .progress-text {
      font-size: 11px;
      color: #666;
      margin-top: 4px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/capaz-logo.png" class="header-logo" alt="Capaz">
    <div class="header-text">
      <h1>STEELHEAD AUTOMATOR</h1>
      <div class="subtitle">Ecoplating — Carga Masiva</div>
    </div>
    <img src="icons/steelhead-logo.png" class="header-logo" alt="Steelhead">
  </div>

  <div id="status-bar" class="status-bar">
    <span><span class="status-dot"></span> <span id="status-text">Conectando...</span></span>
    <span id="version-text">v--</span>
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="btn-upload">
      <span class="icon">📊</span>
      <span class="label">
        Cargar Excel
        <small>Subir cotizaciones y números de parte</small>
      </span>
    </button>

    <button class="btn" id="btn-template">
      <span class="icon">📥</span>
      <span class="label">
        Descargar Plantilla
        <small>Excel con catálogos actualizados</small>
      </span>
    </button>

    <button class="btn" id="btn-status">
      <span class="icon">🔄</span>
      <span class="label">
        Ver Estado
        <small>Versión, conexión y sincronización</small>
      </span>
    </button>

    <button class="btn btn-reload" id="btn-reload">
      <span class="icon">🔃</span>
      <span class="label">
        Recargar Steelhead
        <small>Recarga la pestaña para aplicar cambios</small>
      </span>
    </button>
  </div>

  <div id="progress-container" class="progress-container">
    <div class="progress-bar">
      <div id="progress-fill" class="progress-fill"></div>
    </div>
    <div id="progress-text" class="progress-text"></div>
  </div>

  <input type="file" id="file-input" accept=".csv">

  <div class="footer">
    Steelhead Automator v1.0.0 — Ecoplating
  </div>

  <script src="popup.js"></script>
</body>
</html>
